name: Validate Examples

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  example-sources:
    name: Example Registry Sources
    runs-on: ubuntu-latest
    # Skip on the template repo itself — its examples intentionally keep ../../ for local testing.
    # Derived module repos must replace the local source with the registry source before publishing.
    if: github.repository != 'rpothin/terraform-powerplatform-module-template'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check example sources point to registry
        run: |
          if grep -r 'source = "../../"' examples/; then
            echo ""
            echo "ERROR: One or more examples still use a local source path ('../../')."
            echo "Replace with the Terraform Registry source derived from the repo name:"
            echo "  strip 'terraform-powerplatform-' from the repo name → {module-name}"
            echo "  source = \"rpothin/{module-name}/powerplatform\""
            echo "See AGENTS.md for the full convention."
            exit 1
          fi
          echo "All examples use registry sources."
